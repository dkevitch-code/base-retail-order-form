<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base Retail Order Form</title>
<style>
  :root {
    --terminal: #292826;
    --conduit: #f0eeeb;
    --grounded: #1e4d2b;
    --livewire: #b2dd79;
    --strike: #ffffff;
    --subtle: #d8d7d5;
    --secondary: #7f7d7a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--conduit);
    color: var(--terminal);
  }
  #app { min-height: 100vh; padding: 48px 16px; }
  @media (min-width: 768px) { #app { padding: 64px 32px; } }
  .wrap { max-width: 880px; margin: 0 auto; }
  .eyebrow {
    font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--grounded); margin: 0 0 8px;
  }
  h1 { font-size: 32px; font-weight: 600; line-height: 1.15; margin: 0 0 12px; }
  .intro { font-size: 16px; color: var(--secondary); max-width: 62ch; margin: 0 0 24px; }
  .config-warning {
    font-size: 13px; color: #92400e; background: #fef3c7; border: 1px solid #fde68a;
    border-radius: 8px; padding: 12px 16px; margin: 0 0 32px;
  }
  section.group { margin-bottom: 48px; }
  h2 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .group-note { font-size: 14px; color: var(--secondary); margin: 0 0 24px; }
  .field-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px; }
  label.field-label {
    font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--secondary);
  }
  input[type="text"], input[type="date"], textarea {
    font-family: inherit; font-size: 14px; padding: 12px 16px;
    border: 1px solid var(--subtle); border-radius: 8px;
    background: var(--strike); color: var(--terminal); max-width: 420px; width: 100%;
  }
  textarea { resize: vertical; min-height: 64px; }
  input:focus, textarea:focus, select:focus, button:focus-visible {
    outline: 2px solid var(--grounded); outline-offset: 2px;
  }
  .item-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--subtle);
  }
  .item-row:first-of-type { border-top: 1px solid var(--subtle); }
  .item-info { display: flex; flex-direction: column; gap: 2px; }
  .item-name { font-size: 14px; font-weight: 500; }
  .item-note { font-size: 12px; color: var(--secondary); }
  .stepper { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .stepper button {
    width: 32px; height: 32px; min-width: 44px; min-height: 44px;
    border-radius: 9999px; border: 1px solid var(--subtle); background: var(--strike);
    color: var(--terminal); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .stepper button:hover { border-color: var(--terminal); }
  .stepper .qty { width: 32px; text-align: center; font-size: 14px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .size-block { margin-bottom: 20px; }
  .size-block-label { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  .size-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; max-width: 480px; }
  .size-cell { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .size-cell label {
    font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--secondary);
  }
  .size-cell input { width: 100%; text-align: center; padding: 8px 4px; max-width: none; }
  .actions { display: flex; align-items: center; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
  .btn-primary {
    font-family: inherit; font-size: 14px; font-weight: 500; padding: 14px 28px;
    min-height: 44px; border-radius: 9999px; border: none; background: var(--livewire);
    color: var(--grounded); cursor: pointer;
  }
  .btn-primary:hover { filter: brightness(0.96); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    font-family: inherit; font-size: 14px; font-weight: 500; padding: 12px 24px;
    min-height: 44px; border-radius: 9999px; border: 1px solid var(--subtle);
    background: transparent; color: var(--terminal); cursor: pointer;
  }
  .btn-secondary:hover { border-color: var(--terminal); }
  .status-msg { font-size: 14px; color: var(--grounded); margin-top: 12px; }
  .error { color: #c51808; font-size: 14px; margin-top: 12px; }
  .summary-panel {
    border: 1px solid var(--subtle); border-radius: 16px; background: var(--strike);
    padding: 24px; margin-top: 24px;
  }
  .summary-panel h3 { font-size: 16px; font-weight: 600; margin: 0 0 12px; }
  .summary-panel pre {
    font-family: inherit; font-size: 13px; white-space: pre-wrap;
    margin: 0 0 16px; color: var(--terminal);
  }
  .toggle-link {
    font-size: 13px; color: var(--grounded); background: none; border: none;
    text-decoration: underline; cursor: pointer; padding: 0; font-family: inherit;
  }
  .tracker-table-wrap { overflow-x: auto; margin-top: 16px; }
  table.tracker { border-collapse: collapse; width: 100%; min-width: 920px; font-size: 13px; }
  table.tracker th {
    text-align: left; font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--secondary); padding: 8px 12px;
    border-bottom: 1px solid var(--subtle); white-space: nowrap;
  }
  table.tracker td { padding: 8px 12px; border-bottom: 1px solid var(--subtle); vertical-align: middle; }
  table.tracker input[type="text"], table.tracker input[type="date"], table.tracker select {
    font-family: inherit; font-size: 13px; padding: 6px 8px; border: 1px solid var(--subtle);
    border-radius: 8px; background: var(--strike); color: var(--terminal);
    max-width: none; width: 100%; min-width: 90px;
  }
  table.tracker .notes-input { min-width: 160px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  // ---- CONFIGURE THIS ----
  // Paste your deployed Apps Script Web App URL here (see Code2.gs setup comments).
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxdo_ry6KEm8LHyQ9v3UyW56_6LJiWkSpxFlVmlFQD8ZubLbUYHfIu8cctc28FTKJd1YA/exec';
  // -------------------------

  const boothItems = [
    { id: 'lanyard', label: 'Lanyard' },
    { id: 'ipad', label: 'iPad' },
    { id: 'hotspot', label: 'Hot spot' },
    { id: 'stand', label: 'Swivel stand' },
    { id: 'ipadcase', label: 'iPad case', note: 'Optional — prioritize stands' },
    { id: 'table', label: 'Table' },
    { id: 'tablecloth', label: 'Tablecloth (HEB)' },
    { id: 'cutout', label: 'Battery cutout' },
    { id: 'frames', label: '11×17 tabletop frame' },
  ];

  const docItems = [
    { id: 'rep', label: '[DOC] REP comparison' },
    { id: 'howbase', label: '[DOC] How Base works' },
    { id: 'coverage', label: '[DOC] Coverage map (TX)' },
    { id: 'backup', label: '[DOC] Backup power one-pager' },
    { id: 'efl', label: '[DOC] Electricity facts label (EFL)' },
    { id: 'tos', label: '[DOC] Energy terms of service (TOS)' },
    { id: 'yrac', label: '[DOC] Your rights as a customer (YRAC)' },
    { id: 'bsa', label: '[DOC] Battery services agreement' },
    { id: 'priceguide', label: '[DOC] Price guide' },
  ];

  const apparelItems = [ { id: 'hat', label: 'Hat' } ];
  const sizes = ['XS', 'S', 'M', 'L', 'XL', 'XXL'];
  const statuses = ['Requested', 'Ordered', 'Figuring out', 'Received', 'Cancelled'];

  function todayISO() { return new Date().toISOString().slice(0, 10); }

  const state = { requester: '', address: '', date: todayISO(), qty: {}, apparel: {} };
  boothItems.forEach(i => state.qty[i.id] = 0);
  docItems.forEach(i => state.qty[i.id] = 0);
  apparelItems.forEach(i => state.qty[i.id] = 0);
  sizes.forEach(s => state.apparel[s] = 0);

  let submitting = false;
  let lastSummary = null;
  let showTracker = false;
  let trackerRows = [];
  let trackerLoadError = null;

  const configured = APPS_SCRIPT_URL && APPS_SCRIPT_URL.indexOf('PASTE_YOUR_WEB_APP_URL_HERE') === -1;
  const app = document.getElementById('app');

  function itemRow(item) {
    const qty = state.qty[item.id];
    return `
      <div class="item-row">
        <div class="item-info">
          <span class="item-name">${item.label}</span>
          ${item.note ? `<span class="item-note">${item.note}</span>` : ''}
        </div>
        <div class="stepper">
          <button type="button" data-action="dec" data-id="${item.id}" aria-label="Decrease ${item.label} quantity">−</button>
          <span class="qty">${qty}</span>
          <button type="button" data-action="inc" data-id="${item.id}" aria-label="Increase ${item.label} quantity">+</button>
        </div>
      </div>`;
  }

  function sizeBlock() {
    return `
      <div class="size-block">
        <div class="size-block-label">T-shirts / Polo</div>
        <div class="size-grid">
          ${sizes.map(s => `
            <div class="size-cell">
              <label for="shirt-${s}">${s}</label>
              <input type="text" inputmode="numeric" pattern="[0-9]*" id="shirt-${s}"
                data-size="${s}" value="${state.apparel[s] || ''}" placeholder="0" />
            </div>`).join('')}
        </div>
      </div>`;
  }

  function buildOrderLines() {
    const lines = [];
    boothItems.forEach(i => { if (state.qty[i.id] > 0) lines.push({ item: i.label, size: 'N/A', count: state.qty[i.id] }); });
    apparelItems.forEach(i => { if (state.qty[i.id] > 0) lines.push({ item: i.label, size: 'N/A', count: state.qty[i.id] }); });
    sizes.forEach(s => { if (state.apparel[s] > 0) lines.push({ item: 'T-shirts / Polo', size: s, count: state.apparel[s] }); });
    docItems.forEach(i => { if (state.qty[i.id] > 0) lines.push({ item: i.label, size: 'N/A', count: state.qty[i.id] }); });
    return lines;
  }

  function csvEscape(val) {
    const s = String(val == null ? '' : val);
    if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function exportCSV() {
    const header = ['Date', 'Shipping Address', 'Requestor', 'Item', 'Size', 'Count', 'Status', 'ETA', 'Notes'];
    const rows = trackerRows.map(r => [r.date, r.address, r.requester, r.item, r.size, r.count, r.status, r.eta || '', r.notes || '']);
    const csv = [header, ...rows].map(row => row.map(csvEscape).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'base-retail-orders.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  async function loadTracker() {
    trackerLoadError = null;
    try {
      const res = await fetch(APPS_SCRIPT_URL, { method: 'GET' });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Unknown error');
      trackerRows = data.rows || [];
    } catch (e) {
      trackerRows = [];
      trackerLoadError = e.message || String(e);
    }
  }

  function render() {
    app.innerHTML = `
      <div class="wrap">
        <p class="eyebrow">Retail operations</p>
        <h1>Base Retail Order Form</h1>
        <p class="intro">Order booth gear, apparel, and printed materials for a retail operation. Submitting adds a row per item to the shared order sheet — status, ETA, and notes can be updated afterward.</p>

        ${!configured ? `
          <div class="config-warning">
            This form isn't connected to a sheet yet — an admin needs to paste the deployed
            Apps Script Web App URL into <code>APPS_SCRIPT_URL</code> near the top of the file.
          </div>` : ''}

        <section class="group">
          <h2>Requester</h2>
          <div class="field-row">
            <label class="field-label" for="requester">Requestor</label>
            <input type="text" id="requester" value="${state.requester}" placeholder="Daniela/Tristan" />
          </div>
          <div class="field-row">
            <label class="field-label" for="address">Shipping address</label>
            <textarea id="address" placeholder="5465 Legacy Dr #650, Plano, TX 75024">${state.address}</textarea>
          </div>
          <div class="field-row">
            <label class="field-label" for="orderdate">Date</label>
            <input type="date" id="orderdate" value="${state.date}" style="max-width:200px;" />
          </div>
        </section>

        <section class="group">
          <h2>Apparel</h2>
          <p class="group-note">Quantity by size, XS–XXL.</p>
          ${apparelItems.map(itemRow).join('')}
          ${sizeBlock()}
        </section>

        <section class="group">
          <h2>Printed materials</h2>
          <p class="group-note">Quantity of copies needed.</p>
          ${docItems.map(itemRow).join('')}
        </section>

        <section class="group">
          <h2>Booth essentials</h2>
          <p class="group-note">Hardware, signage, and setup gear.</p>
          ${boothItems.map(itemRow).join('')}
        </section>

        <div class="actions">
          <button type="button" class="btn-primary" id="submit-btn" ${submitting || !configured ? 'disabled' : ''}>
            ${submitting ? 'Submitting…' : 'Submit order'}
          </button>
          <button type="button" class="btn-secondary" id="reset-btn">Clear form</button>
        </div>
        <div id="status-area"></div>

        ${lastSummary ? `
          <div class="summary-panel">
            <h3>Order submitted</h3>
            <pre>${lastSummary.join('\n')}</pre>
          </div>` : ''}

        <section class="group" style="margin-top:64px;">
          <button type="button" class="toggle-link" id="tracker-toggle">
            ${showTracker ? 'Hide tracker' : 'View order tracker'}
          </button>
          ${showTracker ? renderTracker() : ''}
        </section>
      </div>`;

    attachHandlers();
  }

  function renderTracker() {
    if (trackerLoadError) {
      return `<p class="error" style="margin-top:16px;">Couldn't load the tracker: ${trackerLoadError}</p>`;
    }
    if (trackerRows.length === 0) {
      return '<p class="group-note" style="margin-top:16px;">No orders submitted yet.</p>';
    }
    return `
      <div class="actions" style="margin-top:16px;">
        <button type="button" class="btn-secondary" id="export-csv-btn">Export CSV</button>
      </div>
      <div class="tracker-table-wrap">
        <table class="tracker">
          <thead>
            <tr>
              <th>Date</th><th>Shipping address</th><th>Requestor</th><th>Item</th>
              <th>Size</th><th>Count</th><th>Status</th><th>ETA</th><th>Notes</th>
            </tr>
          </thead>
          <tbody>
            ${trackerRows.map(r => `
              <tr data-row-number="${r.rowNumber}">
                <td>${r.date || ''}</td>
                <td>${r.address || ''}</td>
                <td>${r.requester || ''}</td>
                <td>${r.item}</td>
                <td>${r.size}</td>
                <td>${r.count}</td>
                <td>
                  <select data-field="status" data-row-number="${r.rowNumber}">
                    ${statuses.map(s => `<option value="${s}" ${r.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                  </select>
                </td>
                <td><input type="date" data-field="eta" data-row-number="${r.rowNumber}" value="${r.eta || ''}" /></td>
                <td><input type="text" class="notes-input" data-field="notes" data-row-number="${r.rowNumber}" value="${(r.notes || '').replace(/"/g, '&quot;')}" placeholder="—" /></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function attachHandlers() {
    app.querySelectorAll('.stepper button').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-id');
        const action = btn.getAttribute('data-action');
        if (action === 'inc') state.qty[id] = (state.qty[id] || 0) + 1;
        else state.qty[id] = Math.max(0, (state.qty[id] || 0) - 1);
        render();
      });
    });

    app.querySelectorAll('.size-cell input').forEach(inp => {
      inp.addEventListener('input', () => {
        const size = inp.getAttribute('data-size');
        const val = parseInt(inp.value.replace(/[^0-9]/g, ''), 10);
        state.apparel[size] = isNaN(val) ? 0 : val;
      });
      inp.addEventListener('blur', render);
    });

    const requesterInput = document.getElementById('requester');
    if (requesterInput) requesterInput.addEventListener('input', e => state.requester = e.target.value);
    const addressInput = document.getElementById('address');
    if (addressInput) addressInput.addEventListener('input', e => state.address = e.target.value);
    const dateInput = document.getElementById('orderdate');
    if (dateInput) dateInput.addEventListener('input', e => state.date = e.target.value);

    const submitBtn = document.getElementById('submit-btn');
    if (submitBtn) submitBtn.addEventListener('click', handleSubmit);

    const resetBtn = document.getElementById('reset-btn');
    if (resetBtn) resetBtn.addEventListener('click', () => {
      boothItems.forEach(i => state.qty[i.id] = 0);
      docItems.forEach(i => state.qty[i.id] = 0);
      apparelItems.forEach(i => state.qty[i.id] = 0);
      sizes.forEach(s => state.apparel[s] = 0);
      state.requester = ''; state.address = ''; state.date = todayISO();
      lastSummary = null;
      render();
    });

    const trackerToggle = document.getElementById('tracker-toggle');
    if (trackerToggle) trackerToggle.addEventListener('click', async () => {
      if (!showTracker) {
        trackerToggle.textContent = 'Loading…';
        await loadTracker();
      }
      showTracker = !showTracker;
      render();
    });

    const exportBtn = document.getElementById('export-csv-btn');
    if (exportBtn) exportBtn.addEventListener('click', exportCSV);

    app.querySelectorAll('table.tracker [data-field]').forEach(el => {
      el.addEventListener('change', async () => {
        const rowNumber = parseInt(el.getAttribute('data-row-number'), 10);
        const field = el.getAttribute('data-field');
        const row = trackerRows.find(r => r.rowNumber === rowNumber);
        if (row) row[field] = el.value;
        try {
          await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'update', rowNumber, field, value: el.value }),
          });
        } catch (e) { /* best effort */ }
      });
    });
  }

  async function handleSubmit() {
    const statusArea = document.getElementById('status-area');
    const lines = buildOrderLines();
    if (lines.length === 0) {
      statusArea.innerHTML = '<p class="error">Add a quantity to at least one item before submitting.</p>';
      return;
    }
    if (!state.requester.trim()) {
      statusArea.innerHTML = '<p class="error">Add a requestor name before submitting.</p>';
      return;
    }

    submitting = true;
    render();

    try {
      const rows = lines.map(l => ({
        date: state.date, address: state.address, requester: state.requester,
        item: l.item, size: l.size, count: l.count, status: 'Requested', eta: '', notes: '',
      }));
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'append', rows }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Unknown error');

      lastSummary = [
        `Requestor: ${state.requester}`,
        `Shipping address: ${state.address || '—'}`,
        `Date: ${state.date}`,
        '',
        ...lines.map(l => `${l.item}${l.size !== 'N/A' ? ' (' + l.size + ')' : ''}: ${l.count}`),
      ];
    } catch (e) {
      lastSummary = null;
      submitting = false;
      render();
      document.getElementById('status-area').innerHTML =
        '<p class="error">Could not save the order: ' + (e.message || String(e)) + '</p>';
      return;
    }

    submitting = false;
    render();
  }

  render();
})();
</script>
</body>
</html>
